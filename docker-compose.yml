version: '3.8'

services:
  backend:
    build: .
    container_name: biblegraph_backend
    ports:
      - "8070:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    depends_on:
      - neo4j
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: biblegraph_neo4j
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
